services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${STREAMLIT_SERVER_PORT:-8501}:${STREAMLIT_SERVER_PORT:-8501}"
    environment:
      STREAMLIT_SERVER_ADDRESS: ${STREAMLIT_SERVER_ADDRESS:-0.0.0.0}
      STREAMLIT_SERVER_PORT: ${STREAMLIT_SERVER_PORT:-8501}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, urllib.request; port=os.getenv('STREAMLIT_SERVER_PORT', '8501'); urllib.request.urlopen(f'http://127.0.0.1:{port}').read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
